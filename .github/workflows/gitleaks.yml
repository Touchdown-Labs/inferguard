name: gitleaks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The official gitleaks-action requires a paid license on org-owned
# repos (https://github.com/gitleaks/gitleaks-action#-announcement).
# We run the gitleaks binary directly instead — same scanner, no license.
jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan for secrets
        run: gitleaks detect --source . --redact --verbose --no-banner --config .gitleaks.toml
