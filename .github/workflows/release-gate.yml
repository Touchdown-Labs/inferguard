name: Release Gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  production-ready-trust-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: pip install -e .[dev,mcp]

      - name: Run release-gate tests
        run: pytest -v

      - name: Ruff check production and tests
        run: ruff check src/ tests/

      - name: No production placeholders
        run: python scripts/scan_no_stubs.py src/inferguard/
