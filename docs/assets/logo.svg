<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 48" width="320" height="48">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00AAFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Mark: Abstract KV cache / memory hierarchy glyph -->
  <g transform="translate(0, 4)">
    <!-- Three horizontal bars â memory tiers -->
    <rect x="2" y="4" width="28" height="5" rx="1" fill="#0A0A0A"/>
    <rect x="6" y="15" width="20" height="5" rx="1" fill="#0A0A0A" opacity="0.6"/>
    <rect x="10" y="26" width="12" height="5" rx="1" fill="url(#accent)" opacity="0.8"/>
    <!-- Vertical connector -->
    <line x1="16" y1="9" x2="16" y2="15" stroke="#0A0A0A" stroke-width="1.5" opacity="0.3"/>
    <line x1="16" y1="20" x2="16" y2="26" stroke="#0066FF" stroke-width="1.5" opacity="0.4"/>
